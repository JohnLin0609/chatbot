# Shared backend env: inside the compose network the stores are reached by
# service name + internal port (NOT the dedicated host ports below). `environment:`
# wins over `env_file: .env`, so the same .env works for host-run and docker-run.
x-backend-env: &backend-env
  REDIS_URL: redis://redis:6379/0
  POSTGRES_DSN: postgresql+asyncpg://chat:chat@postgres:5432/chat
  QDRANT_URL: http://qdrant:6333

services:
  redis:
    image: redis:7-alpine
    # Host port 6380 (not the default 6379) so this project's Redis never
    # collides with any other Redis already running on the machine.
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    # Host port 5434 (not the default 5432) for the same isolation reason.
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # the qdrant image has no curl; probe the port over TCP from bash.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----- application services (only started with `--profile app`) -----

  # One-shot: bring the DB schema up to date, then exit. worker/api wait for this.
  migrate:
    build: .
    profiles: ["app"]
    command: alembic upgrade head
    env_file: .env
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Core consumer: inbound stream -> pipeline -> outbound, plus the idle-session sweeper.
  worker:
    build: .
    profiles: ["app"]
    command: python -m interfaces.worker
    env_file: .env
    environment: *backend-env
    volumes:
      - hf_cache:/root/.cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Unified JWT API. Published on 8753 for curl/debug; the SPA reaches it via nginx.
  api:
    build: .
    profiles: ["app"]
    command: uvicorn interfaces.api_app:app --host 0.0.0.0 --port 8753
    env_file: .env
    environment: *backend-env
    ports:
      - "8753:8753"
    volumes:
      - hf_cache:/root/.cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Web console: nginx serves the built SPA and reverse-proxies the API.
  frontend:
    build: ./frontend
    profiles: ["app"]
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
  hf_cache:
