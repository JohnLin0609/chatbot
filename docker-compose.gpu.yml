# GPU override: build the worker image with CUDA torch and reserve the host GPU
# for its Qwen3 reranker. Requires nvidia-container-toolkit on the host (registers
# the `nvidia` runtime). Opt-in — the base compose stays a lean CPU image.
# Usage (the --build is needed the first time to pull the CUDA wheel):
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile app up -d --build
services:
  worker:
    build:
      context: .
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu130
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
