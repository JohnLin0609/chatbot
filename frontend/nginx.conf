server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow .pptx uploads through /ingest/pptx without hitting the default 1m cap.
    client_max_body_size 25m;

    # Reverse-proxy the API routes to the api service (single origin = no CORS).
    location ~ ^/(health|auth|chat|ingest|documents) {
        proxy_pass http://api:8753;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history fallback: everything else serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
