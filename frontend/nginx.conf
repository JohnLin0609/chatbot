server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow .pptx uploads through /api/ingest/pptx without hitting the 1m default.
    client_max_body_size 25m;

    # All API calls are namespaced under /api/ so they never collide with SPA
    # routes (e.g. the /admin/system-prompt *page* vs the same-named endpoint).
    # The trailing slash on proxy_pass strips the /api prefix:
    #   /api/auth/login -> http://api:8753/auth/login
    location /api/ {
        proxy_pass http://api:8753/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Convenience: a plain :8080/health that proxies to the API health check.
    location = /health {
        proxy_pass http://api:8753/health;
    }

    # SPA history fallback: everything else serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
